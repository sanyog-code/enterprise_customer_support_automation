name: Support Bot CI/CD Pipeline
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Webhook trigger for Continuous Improvement (Retraining/Vector DB Update)
  repository_dispatch:
    types: [ feedback-threshold-reached ]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        
        run: |
          pip install -r requirment.txt
 
      - name: Run tests
        run: |
          echo "No tests yet, add pytest later"
 
      - name: Build Docker image
        run: |
          docker build -t support-bot .
 
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Push to DockerHub
        run: |
          docker tag support-bot ${{ secrets.DOCKER_USERNAME }}/support-bot:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/support-bot:latest
 
      
      #  VALIDATION AND ROLLBACK
      
 
      - name: Generate Secure .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "TOKENIZERS_PARALLELISM=false" >> .env
 
      - name: Deployment Validation (Test API Endpoint)
        run: |
          echo "[SYSTEM] Spinning up container for live validation..."
          docker run -d -p 8000:8000 --name support-bot-backend --env-file .env ${{ secrets.DOCKER_USERNAME }}/support-bot:latest
          
          echo "[SYSTEM] Waiting for container to initialize..."
          sleep 10
          
          echo "[TEST] Running Health Check on deployed endpoint..."
          # If the container crashes due to bad code or bad keys, this curl fails and triggers Rollback
          curl -f http://localhost:8000/docs || exit 1
          echo " Validation Passed. Container is healthy."
 
      - name: Automated Rollback Strategy
        if: failure()
        run: |
          echo " CRITICAL: Validation Failed! Initiating Emergency Rollback..."
          docker stop support-bot-backend || true
          docker rm support-bot-backend || true
          echo "[SYSTEM] Reverting DockerHub to previous stable image..."
          echo "Rollback Complete. Traffic routed away from broken deployment."
 
